<svg width="800" height="80" viewBox="0 0 800 80" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="80" fill="#2d353b"/>

  <!--
    6 phrases x 3s each = 18s total
    Each phrase: fade in at Xs, hold, fade out at X+2.8s
    keyTimes must match values count
    Pattern per phrase (18 keyframes at equal spacing = 1/18 each):
    phrase 1 : slots 0-2   (0s-3s)
    phrase 2 : slots 3-5   (3s-6s)
    phrase 3 : slots 6-8   (6s-9s)
    phrase 4 : slots 9-11  (9s-12s)
    phrase 5 : slots 12-14 (12s-15s)
    phrase 6 : slots 15-17 (15s-18s)
  -->

  <!-- PHRASE 1 — Md. Tanvir Rahman Fahim (slots 0-2) -->
